[package]
name = "envseal"
version = "0.1.0"
edition = "2021"
description = "A local, file-based GitHub Secrets: an age-encrypted key-value store surfaced by name."
license = "MIT"

[[bin]]
name = "envseal"
path = "src/main.rs"

[dependencies]
zeroize = "1"
age = "0.11"

[profile.release]
strip = true
lto = true
opt-level = "z"
